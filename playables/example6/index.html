function move(obj,posx,posy,time,finalEvent,eventTime,timeTween){
	if(eventTime == null) eventTime = 1500;
	if(timeTween == null) timeTween = 800;
	game.time.events.add(time, function() { 
		var tween = game.add.tween(obj).to({ x: posx, y: posy}, timeTween, Phaser.Easing.Sinusoidal.InOut).start();
		if(finalEvent)
			game.time.events.add(eventTime, finalEvent, this);
	}, this);
}

function moveFairy(obj,angles,posx,posy,time,finalEvent,eventTime,timeTween){
	if(eventTime == null) eventTime = 1500;
	if(timeTween == null) timeTween = 800;
	game.time.events.add(time, function() { 
		game.add.tween(obj.scale).to({ x: 0.8, y: 0.8}, timeTween, Phaser.Easing.Sinusoidal.Out).start();
		var tween = game.add.tween(obj).to({angle:angles, x: posx, y: posy}, timeTween, Phaser.Easing.Sinusoidal.InOut).start();
		if(finalEvent)
			game.time.events.add(eventTime, finalEvent, this);
	}, this);
}

function popUpMsg(msg,time,finalEvent,eventTime){
	if(eventTime == null) eventTime = 1500;
	game.time.events.add(time, function() { 
		var tween = game.add.tween(msg.scale).to({ x: 1.1, y: 1.1}, 400, Phaser.Easing.Sinusoidal.In).to({ x: 1, y: 1}, 250, Phaser.Easing.Sinusoidal.Out).start();
		if(finalEvent)
			game.time.events.add(eventTime, finalEvent, this);
	}, this);
}

function createScene(){
	this.witch = game.add.sprite(this.minWidth*0.81, this.minHeight*0.8, 'bg','witch.png');
    this.witch.anchor.set(0.5);
   	this.circle = game.add.sprite(this.minWidth*0.5, this.minHeight*0.8, 'bg','ellipse.png');
    this.circle.anchor.set(0.5);
    this.sceneGroup.addMultiple([this.witch,this.circle]);
    resetScene();
}

function resetScene(){
	this.sceneGroup.setAll('scale.x',0);
    this.sceneGroup.setAll('scale.y',0);
}

function createIntro(){
	this.msgIntro = game.add.sprite(this.minWidth*0.5, this.minHeight*0.42, 'ui','msg1.png');

	this.play.events.onInputUp.add(startTutorailMsg,this);

    this.help2.anchor.set(0.5);

    this.help3 = game.add.sprite(this.minWidth*0.65, this.minHeight*0.15, 'ui','help.png');

function addTile(x, y,frame) {
	var frameNumber = frame;
	var frameFlag = frame;

	if(frameNumber == 0)
    	frameNumber = 1;
    
    var tile = this.tiles.create(x * 40, y * 40,'bubbles','bubble'+frameNumber+'.png');
   
    if (y % 2) tile.x += tile.width/2.5;
    tile.color = frameFlag;
    if(tile.color == 0){
    	tile.alpha = 0;
    	tile.alive = false;
    	tile.removed = false;
    }
	game.physics.enable(tile, Phaser.Physics.ARCADE);
	tile.enableBody = true;
	tile.body.immovable  = true;
	tile.body.setCircle(tile.width*0.23, (-(tile.width*0.23) + 0.5 * tile.width  / tile.scale.x),(-(tile.width*0.23) + 0.5 * tile.height / tile.scale.y));
    
    tile.removed = false;	
    tile.anchor.setTo(0.5);
    tile.scale.setTo(0.8);
    tile.column = x;
    tile.row = y;
    tile.haveFairy = false;
    tile.processed = false;
    if(y>=3)
    	tile.level = 4;
    else if (y<3)
    	tile.level = 2;

    var burst = this.burst.create(x * 40, y * 40,'bg','burst.png');
    if (y % 2) burst.x += burst.width/2.5;
    burst.anchor.setTo(0.5);
    burst.scale.setTo(0.8);
    burst.alpha = 0;

    if(this.fairyGrid[x][y] == 1){
    	var fairy = this.fairies.create(x * 40, y * 40,'ui','fairyTiny.png');
    	fairy.scale.setTo(0.2);
    	fairy.anchor.setTo(0.5);
    	tile.haveFairy = true;
    	tile.fairyID = this.fairies.length;
    	if (y % 2) fairy.x += fairy.width/2.5;
    }
    return tile;
}

function drawTrajectory() {
    this.bitmap.context.clearRect(0, 0,this.minWidth, this.minHeight);
	this.posPoint.y = 0;
    var theta = this.player.rotation;
    var bubble = this.tiles.getClosestTo(this.player,getInRange);
    this.posPoint = this.game.input.getLocalPosition(this.graphics, game.input.activePointer);
    if(bubble){
    	var pontBubble = this.tiles.toGlobal(bubble.position);
    	var posPoint2 = this.game.input.getLocalPosition(this.graphics,pontBubble);
   		var distance = Phaser.Math.distance(this.player.x,this.player.y,posPoint2.x,posPoint2.y+24);
   	}else{
   		var distance = Phaser.Math.distance(this.player.x,this.player.y,this.posPoint.x,this.posPoint.y);
   	}

    if(this.posPoint.x >= this.minWidth*0.45 && this.posPoint.y <= this.minHeight*0.3)return; 
   	if(this.posPoint.x <= this.minWidth*0.25 && this.posPoint.y <= this.minHeight*0.3)return;

    if(this.posPoint.x >= this.minWidth*0.66 || this.posPoint.x <= this.minWidth*0.3)
    	distance = Phaser.Math.distance(this.player.x,this.player.y,this.posPoint.x,this.posPoint.y);
    var direction = 2 * ((Math.PI/2) - theta);

    this.bitmap.context.beginPath();
    this.bitmap.context.moveTo(this.player.x, this.player.y);
	this.bitmap.context.lineTo(this.player.x + distance * Math.cos(theta), this.player.y+distance * Math.sin(theta));
	if(this.posPoint.x >= this.minWidth*0.972){
		if(this.posPoint.y <= this.minHeight*0.25)
			this.bitmap.context.lineTo((this.player.x) * Math.cos(direction), (this.player.y-225) * Math.sin(direction));
		else if(this.posPoint.y <= this.minHeight*0.45)
			this.bitmap.context.lineTo((this.player.x) * Math.cos(direction), (this.player.y-325) * Math.sin(direction));
		else
			this.bitmap.context.lineTo((this.player.x*1.5)  + (distance) * Math.cos(direction), (this.player.y-50)+distance * Math.sin(direction));
	}
	else if(this.posPoint.x <= this.minWidth*0.024){
		if(this.posPoint.y <= this.minHeight*0.35)
			this.bitmap.context.lineTo((this.player.x) * Math.atan(direction), (-this.player.y+275) * Math.sin(direction));
		else if(this.posPoint.y <= this.minHeight*0.45)
			this.bitmap.context.lineTo((this.player.x) * Math.atan(direction), (-this.player.y+525) * Math.sin(direction));
		else
			this.bitmap.context.lineTo((this.player.x*0.5) - (distance) * Math.cos(direction), (this.player.y-50)-distance * Math.sin(direction));
	}
    this.bitmap.context.stroke();
    this.bitmap.context.closePath();
    this.bitmap.dirty = true;
}

function update(){
	if(this.gameIsReady && this.bubbleNext){
		this.posPoint = this.game.input.getLocalPosition(this.graphics, game.input.activePointer);
		if(this.posPoint.x < this.minWidth && this.posPoint.x >0 && this.posPoint.y < this.minHeight*0.65 && this.tap)
			drawTrajectory();
		else {
			this.bitmap.context.clearRect(0, 0,this.minWidth, this.minHeight);
		}

		this.player.rotation = this.game.physics.arcade.angleBetween(this.player, this.posPoint);

		if(this.bubbleNext.y < 0){
			this.readyToTap = true;
			this.bubbleNext.kill();
			stackOut();
		}
		this.tiles.forEach(function(item) {
			if(item.color >=1)

		}, this);	  
	}
}

function resetProcessed() {
    foreachCell((cell, i, j) => {
      cell.processed = false;
    });
  }

function findCluster(tx, ty, matchtype, reset, skipremoved) {
    if (reset) {
      resetProcessed();
    }

    var targetcell = this.tileGrid[tx][ty];

    var toprocess = [targetcell];
    targetcell.processed = true;
    var foundgroup = [];

    while (toprocess.length > 0) {
      var currentcell = toprocess.pop();

      if (currentcell.color == 0) {
        continue;
      }

      if (skipremoved && currentcell.removed) {
        continue;
      }

      if (!matchtype || (currentcell.color == targetcell.color)) {
        foundgroup.push(currentcell);
        var neighbors = getNeighbors(currentcell.column, currentcell.row);
        for (var i = 0; i < neighbors.length; i++) {
          if (!neighbors[i].processed) {
            toprocess.push(neighbors[i]);
            neighbors[i].processed = true;
          }
        }
      }
    }
    return foundgroup;
  }

  function getNeighbors(c, r) {
        var tilerow = r % 2; // Even or odd row
        var neighbors = [];
        
        // Get the neighbor offsets for the specified tile
        var n = this.neighborsoffsets[tilerow];
        
        // Get the neighbors
        for (var i=0; i<n.length; i++) {
            // Neighbor coordinate
            var nx = c + n[i][0];
            var ny = r + n[i][1];
            
            // Make sure the tile is valid
            if (nx >= 0 && nx < this._totalColumns && ny >= 0 && ny < this._totalRows) {
                neighbors.push(this.tileGrid[nx][ny]);
            }
        }
        
        return neighbors;
  }

  function snapBubble(c, r, x, y,color) {
    var addcell = false;
    var itemsEmpty = [];

    if (this.tileGrid[c][r].color != 0 && (this.tileGrid[c][r].color < 5)) {
      let distanceItems = [];
      let neighbors = getNeighbors(c, r);
      
        for (let i = 0; i < neighbors.length; i++) {

        let itemX = neighbors[i].x;
        let itemY = neighbors[i].y;
        if (neighbors[i].color === 0 && neighbors[i].alpha ===0)
          distanceItems.push({item: neighbors[i], distance: Phaser.Math.distance(0, y, 0, itemY)});
      }
      if (distanceItems.length > 0) {
        let targetItem = distanceItems[distanceItems.map((item) => item.distance).indexOf(Math.min.apply(Math, distanceItems.map((item) => item.distance)))];
        c = targetItem.item.column;
        r = targetItem.item.row;
      }

    addcell = true;
    } else {
      return {exist: false, changeAngle: true};
    }

    if (addcell) {
      this.tileGrid[c][r].scale.setTo(0.8);
      this.tileGrid[c][r].color = color;
      this.tileGrid[c][r].alpha = 1;
	  this.tileGrid[c][r].visible = true;
	  this.tileGrid[c][r].frameName = 'bubble'+color+'.png'
      return {color:color, x:  this.tileGrid[c][r].x, y: this.tileGrid[c][r].y, c: c, r: r, exist: true, changeAngle: false};
    } else return {exist: false, changeAngle: false};
  }

  function foreachCell(func) {
    for (var i = 0; i < this._totalColumns; i++) {
      for (var j = 0; j < this._totalRows; j++) {
        func(this.tileGrid[i][j], i, j);
      }
    }
  }

  function resetRemoved() {
    foreachCell((cell, i, j) => {
      cell.removed = false;
    });
  }

  function remove() {
    foreachCell((cell, i, j) => {
		if(!cell.visible){
			this.tiles.remove(cell,true);
		}
    });
  }

 function stateRemoveGroup(groupFind) {
    var i = 0;
    var j = 0;
    var cell = null;
    var cageDestroyed = false;
    resetRemoved();

    // Pop bubbles
    for (i = 0; i < groupFind.length; i++) {
      cell = groupFind[i];
      if (cell.color >= 1 && cell.color < 5) {
         //cell.removed = true;
        if (cell.haveFairy) {
        	cell.haveFairy = false;
        	this.scorePoints--;
        	this.score.frameName = 'count'+this.scorePoints+'.png';
			if(this.scorePoints!=0)
				this.barGreen.frameName = 'greenbar'+this.scorePoints+'.png';
			else
			this.barGreen.alpha = 0;
        	liberateFairy(this.fairies.children[cell.fairyID-1],this.fairyMovement[cell.fairyID-1],this.minHeight*0.8,500,null);
        }
        game.add.tween(cell.scale).to({x: 0, y: 0}, 250, Phaser.Easing.Linear.In, true);
        cell.visible = false;
        cell.color = 0;
        cell.alpha = 0;

        this.burst.forEach(function(ex) {
    		if (ex.x == cell.x && ex.y == cell.y){
    			ex.scale.setTo(0.8);
    			ex.alpha = 1;
    			game.add.tween(ex.scale).to({x: 0, y: 0}, 800, Phaser.Easing.Linear.In, true);
    		}
    	}, this);
      }
    }

    this.floatinggroups = findFloatingGroups();
    if (this.floatinggroups.length > 0) {
      for (i = 0; i < this.floatinggroups.length; i++) {
        for (j = 0; j < this.floatinggroups[i].length; j++) {
            cell = this.floatinggroups[i][j];
            cell.visible = false;
            game.add.tween(cell.scale).to({x: 0, y: 0}, 250, Phaser.Easing.Linear.In, true);
        	cell.color = 0;
        	cell.alpha = 0;  
        	if (cell.haveFairy) {
	        	cell.haveFairy = false;
	        	this.scorePoints--;
	        	this.score.frameName = 'count'+this.scorePoints+'.png';
				if(this.scorePoints!=0)
					this.barGreen.frameName = 'greenbar'+this.scorePoints+'.png';
				else
				this.barGreen.alpha = 0;
	        	liberateFairy(this.fairies.children[cell.fairyID-1],this.fairyMovement[cell.fairyID-1],this.minHeight*0.8,500,null);
	        }
        }
      }
    }
  }

 function findFloatingGroups() {
    resetProcessed();
    let foundgroups = [];
    for (let i = 0; i < this._totalColumns; i++) {
      for (let j = 0; j < this._totalRows; j++) {
        let cell = this.tileGrid[i][j];
        if (!cell.processed) {
          let foundgroup = findCluster(i, j, false, false, true);
          if (foundgroup.length <= 0) {
            continue;
          }
          let floating = true;
          for (let k = 0; k < foundgroup.length; k++) {
            if (foundgroup[k].y == 0) {
              floating = false;
              break;
            }
          }
          if (floating) {
            foundgroups.push(foundgroup);
          }
        }
      }
    }
    return foundgroups;
  }

  function bubbleStopMove(force = false) {
	var c = this.result.c;
	var r = this.result.r;
	this.bubbleNext.body.velocity.x = 0;
	this.bubbleNext.body.velocity.y = 0;

	if (!force) {
		var groupFind = findCluster(this.result.c, this.result.r, true, true, true);
		this.bubbleNext.kill();
		if (groupFind.length >= 3){
			stateRemoveGroup(groupFind);
			//remove();
		}
		stackOut();
	}
}

function explodeGroup(sprite,item){
	const positionCoords = game.input.getLocalPosition(this.tiles, new Phaser.Point(sprite.x, sprite.y));
	this.result = snapBubble(item.column,item.row,positionCoords.x,positionCoords.y,sprite.color);

	if (this.result.exist !== false || sprite.y >this.minHeight*0.8) {
		this.bubbleStopMove(sprite.y >this.minHeight*0.8);
	}    
    this.onCollision = false;
    game.time.events.add(1000,checkGameOver);
}

function liberateFairy(obj,posx,posy,time,finalEvent,eventTime){
	if(eventTime == null) eventTime = 1500;
	game.time.events.add(time, function() {
		game.add.tween(obj.scale).to({ x: 1, y: 1}, 1000, Phaser.Easing.Sinusoidal.Out,true);
		var tween = game.add.tween(obj).to({angle:[10,-10,5,-5,5,-5,2,-2]}, 500, Phaser.Easing.Sinusoidal.Out).to({ x: posx, y: posy}, 1000, Phaser.Easing.Sinusoidal.Out).start();
		if(finalEvent)
			game.time.events.add(eventTime, finalEvent, this);
	}, this);
}

function checkGameOver(){
	if(this.scorePoints>0){
		this.readyToTap = true;
	}else{
		if(!this.CTAflag){
			this.CTAflag = true;
			startCTA();
		}
	}
}
